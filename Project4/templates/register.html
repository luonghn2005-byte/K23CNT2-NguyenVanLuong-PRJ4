{% extends "base.html" %}
{% block title %}Đăng ký{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <div class="eyebrow">Đăng ký</div>
    <h1>Tạo tài khoản người dùng</h1>
    <p>Tạo tài khoản để lưu thông tin mua sắm và sẵn sàng cho các tính năng cá nhân hóa tiếp theo.</p>

    <form method="post">
      <label>Họ và tên</label>
      <input name="name" required placeholder="Ví dụ: Nguyễn Văn A">

      <label>Email</label>
      <input name="email" type="email" required placeholder="Ví dụ: ban@email.com">

      <label>Số điện thoại</label>
      <input name="phone" placeholder="Ví dụ: 0901234567">

      <label>Địa chỉ</label>
      <input name="address" placeholder="Ví dụ: 12 Lê Lợi, Quận 1, TP.HCM">

      <label>Mật khẩu</label>
      <input name="password" type="password" required placeholder="Tạo mật khẩu đăng nhập">

      <button class="btn" type="submit" style="width:100%;margin-top:26px">Tạo tài khoản</button>
    </form>
  </div>
</section>
{% endblock %}
